<style>

    }

    .app-outer {

        overflow: hidden;

        border-bottom: 1.5px solid #D4C5B0;
        position: relative;
        overflow: hidden;
    }

    .app-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #2B3A4E, #C47A4A, #5A6B3C, #E8B931, #2B3A4E);
    }

    .header-logo {

        height: 52px;
        border-radius: 10px;

        box-shadow: 0 2px 8px rgba(44, 30, 15, 0.1);

    .header-text {

    .header-title {

        font-weight: 700;
        color: #3B2314;

    .header-tagline {

        font-size: 11px;
        color: #8B7355;
        font-style: italic;
        letter-spacing: 0.02em;

        border: none;
        border-radius: 0;
        overflow: hidden;
        background: var(--color-background-primary);

    .sidebar {

    .sidebar-header {

    .sidebar-header h2 {

        color: var(--color-text-secondary);

        letter-spacing: 0.06em;

    .menu-search {

        border-radius: var(--border-radius-md);
        font-size: 14px;
        width: 100%;
        margin-top: 10px;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
    }

    .menu-list {
        overflow-y: auto;
        flex: 1;
    }

    .menu-cat {
        padding: 8px 16px 4px;
        font-size: 11px;
        font-weight: 500;
        color: var(--color-text-tertiary);
        letter-spacing: 0.08em;
    }

    .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        cursor: pointer;
        transition: background 0.1s;
    }

    .menu-item:hover {
        background: var(--color-background-secondary);
    }

    .menu-item-name {
        flex: 1;
        font-size: 14px;
        color: var(--color-text-primary);
    }

    .menu-item-price {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-right: 8px;
    }

    .add-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 0.5px solid var(--color-border-secondary);
        background: transparent;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-primary);
    }

    .add-btn:hover {
        background: var(--color-background-info);
        color: var(--color-text-info);
        border-color: var(--color-border-info);
    }

    .main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .main-tabs {
        display: flex;
        border-bottom: 0.5px solid var(--color-border-tertiary);
    }

    .tab {
        padding: 14px 18px;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        color: var(--color-text-secondary);
        transition: all 0.15s;
    }

    .tab.active {
        color: var(--color-text-primary);
        border-bottom-color: var(--color-text-primary);
        font-weight: 500;
    }

    .tab-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }

    .order-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .order-row-name {
        flex: 1;
        font-size: 14px;
        color: var(--color-text-primary);
    }

    .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .qty-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 0.5px solid var(--color-border-secondary);
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-primary);
    }

    .qty-num {
        font-size: 14px;
        font-weight: 500;
        min-width: 16px;
        text-align: center;
        color: var(--color-text-primary);
    }

    .order-row-total {
        font-size: 14px;
        font-weight: 500;
        min-width: 56px;
        text-align: right;
        color: var(--color-text-primary);
    }

    .remove-btn {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        color: var(--color-text-tertiary);
    }

    .remove-btn:hover {
        color: var(--color-text-danger);
    }

    .current-order {
        background: var(--color-background-secondary);
        border-radius: var(--border-radius-lg);
        padding: 14px;
        margin-bottom: 14px;
    }

    .order-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
    }

    .order-items-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .empty-order {
        text-align: center;
        padding: 32px;
        color: var(--color-text-tertiary);
        font-size: 14px;
    }

    .history-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .history-card {
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 14px;
    }

    .history-card-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    .history-id {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-primary);
    }

    .history-time {
        font-size: 12px;
        color: var(--color-text-tertiary);
    }

    .history-items {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
    }

    .history-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 500;
    }

    .badge-paid {
        background: #EAF3DE;
        color: #3B6D11;
    }

    .badge-unpaid {
        background: #FFF3CD;
        color: #856404;
    }

    .place-order-btn {
        padding: 12px;
        border: 1.5px solid #185FA5;
        border-radius: var(--border-radius-md);
        background: transparent;
        color: #185FA5;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
    }

    .place-order-btn:hover {
        background: #185FA5;
        color: #fff;
    }

    .place-order-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .pay-now-btn {
        padding: 5px 12px;
        border: none;
        border-radius: var(--border-radius-md);
        background: #1D9E75;
        color: #fff;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
    }

    .pay-now-btn:hover {
        opacity: 0.85;
    }

        border-radius: var(--border-radius-lg);
        padding: 14px;

        border: 1px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        background: transparent;
        color: var(--color-text-secondary);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
    }

    .select-order-btn:hover {

    }

        display: flex;
        gap: 8px;
    }

        gap: 10px;
        margin-bottom: 16px;
    }

    .stat-card {

        border-radius: var(--border-radius-md);
        padding: 14px;
    }

    .stat-label {
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-bottom: 4px;
    }

    .stat-value {
        font-size: 22px;
        font-weight: 500;
        color: var(--color-text-primary);
    }

    .stat-sub {
        font-size: 12px;
        color: var(--color-text-tertiary);
        margin-top: 2px;
    }

        padding: 13px;
        border: none;
        border-radius: var(--border-radius-md);
        background: #185FA5;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;

        justify-content: center;
        gap: 8px;
        margin-top: 4px;

    }

    .export-btn:disabled {

        cursor: not-allowed;

        height: 16px;
        flex-shrink: 0;
    }

        border-bottom: 0.5px solid var(--color-border-tertiary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .table-select {
        padding: 6px 10px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        font-size: 14px;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
    }

    .panel-body {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .bill-row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        padding: 4px 0;
        color: var(--color-text-primary);
    }

    .bill-row.muted {
        color: var(--color-text-secondary);
        font-size: 13px;
    }

    .divider {
        border: none;
        border-top: 0.5px solid var(--color-border-tertiary);
        margin: 8px 0;
    }

    .bill-total {
        display: flex;
        justify-content: space-between;
        font-size: 16px;
        font-weight: 500;
        color: var(--color-text-primary);
        padding: 4px 0;
    }

    .pay-section {
        padding: 14px 16px;
        border-top: 0.5px solid var(--color-border-tertiary);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .confirm-btn {
        padding: 12px;
        border: none;
        border-radius: var(--border-radius-md);
        background: #1D9E75;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
    }

    .confirm-btn:hover {
        opacity: 0.88;
    }

    .confirm-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .note-input {
        padding: 8px 10px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        font-size: 13px;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        resize: none;
        width: 100%;
        height: 50px;
    }

    .discount-row {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .discount-input {

        padding: 7px 10px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        font-size: 13px;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);

        color: var(--color-text-secondary);

    .success-toast {

        color: #fff;

        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 10;
    }

    .success-toast.show {
        opacity: 1;
    }

    .app-wrap {

        max-width: 1200px;
        margin: 20px auto;
        padding: 0 12px;

        justify-content: space-between;
        align-items: center;

        background: var(--color-background-secondary);
        border-radius: var(--border-radius-md);

        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;

    .pm-row {
        display: flex;
        justify-content: space-between;
        align-items: center;

        align-items: center;
        gap: 8px;
    }

        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .section-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
    }
</style>

            <div class="header-text">
                <div class="header-title">Chiya Hub & Cafe</div>
                <div class="header-subtitle">Order Management System</div>
            </div>
            <div class="header-tagline">Good Food · Good Mood · Good Time</div>
        </div>
        <div class="app">

            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Menu</h2>
                    <input class="menu-search" placeholder="Search items..." oninput="filterMenu(this.value)">
                </div>
                <div class="menu-list" id="menuList"></div>
            </div>

            <div class="main">
                <div class="main-tabs">
                    <div class="tab active" onclick="switchTab('order',this)">New Order</div>
                    <div class="tab" onclick="switchTab('active',this)">Active <span id="activeCount"
                            style="font-size:11px;background:#FFF3CD;color:#856404;padding:1px 6px;border-radius:10px;margin-left:4px"></span>
                    </div>
                    <div class="tab" onclick="switchTab('history',this)">History</div>
                    <div class="tab" onclick="switchTab('stats',this)">Summary</div>
                </div>
                <div class="tab-content" id="tabContent"></div>
            </div>

            <div class="right-panel">
                <div class="panel-header">
                    <h2>Bill</h2>
                    <select class="table-select" id="tableSelect" onchange="updateBill()">
                        <option>Table 1</option>
                        <option>Table 2</option>
                        <option>Table 3</option>
                        <option>Table 4</option>
                        <option>Table 5</option>
                        <option>Table 6</option>
                        <option>Table 7</option>
                        <option>Takeaway</option>
                    </select>
                </div>
                <div class="panel-body" id="billBody"></div>
                <div class="pay-section">
                    <div class="discount-row">
                        <span class="discount-label">Discount %</span>
                        <input class="discount-input" type="number" id="discountInput" min="0" max="100" value="0"
                            oninput="updateBill()">
                    </div>
                    <textarea class="note-input" id="noteInput" placeholder="Order notes (optional)..."></textarea>

                    <div class="btn-group">
                        <button class="place-order-btn" id="placeBtn" onclick="placeOrder()">Place Order</button>
                        <button class="confirm-btn" id="confirmBtn" onclick="confirmPayment()" style="flex:1">Confirm
                            &amp;
                            Pay</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        {

    ];

    let cart = {}, orders = [], nextOrderId = 1001, activeTab = 'order', selectedOrderId = null;

    const fmt = n => 'Rs ' + Math.round(n).toLocaleString();
    const fmtNum = n => Math.round(n).toLocaleString();

    function getItem(id) { for (const c of MENU) for (const i of c.items) if (i.id == id) return i; }
    function cartItems() { return Object.entries(cart).map(([id, qty]) => ({ item: getItem(id), qty })); }
    function cartTotal() { return cartItems().reduce((s, { item, qty }) => s + item.price * qty, 0); }

    function renderMenu(filter = '') {
        const list = document.getElementById('menuList');
        list.innerHTML = '';
        MENU.forEach(cat => {
            const items = cat.items.filter(i => i.name.toLowerCase().includes(filter.toLowerCase()));
            if (!items.length) return;
            const c = document.createElement('div'); c.className = 'menu-cat'; c.textContent = cat.cat; list.appendChild(c);
            items.forEach(item => {
                const el = document.createElement('div'); el.className = 'menu-item';
                el.innerHTML = `<span class="menu-item-name">${item.name}</span><span class="menu-item-price">${fmt(item.price)}</span><button class="add-btn" onclick="addItem(${item.id})">+</button>`;
                list.appendChild(el);
            });
        });
    }
    function filterMenu(v) { renderMenu(v); }
    function addItem(id) { cart[id] = (cart[id] || 0) + 1; if (activeTab === 'order') renderOrderTab(); updateBill(); }
    function changeQty(id, d) { cart[id] = (cart[id] || 0) + d; if (cart[id] <= 0) delete cart[id]; if (activeTab === 'order') renderOrderTab(); updateBill(); }

    function renderOrderTab() {
        const el = document.getElementById('tabContent'), items = cartItems();
        if (!items.length) { el.innerHTML = `<div class="empty-order">Select items from the menu to add to the order.</div>`; return; }
        el.innerHTML = `<div class="current-order"><div class="order-title"><span>Current order</span><span style="font-size:12px;color:var(--color-text-tertiary)">${items.length} item${items.length > 1 ? 's' : ''}</span></div><div class="order-items-list">${items.map(({ item, qty }) => `<div class="order-row"><span class="order-row-name">${item.name}</span><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty(${item.id},1)">+</button></div><span class="order-row-total">${fmt(item.price * qty)}</span><button class="remove-btn" onclick="changeQty(${item.id},-${qty})">✕</button></div>`).join('')}</div></div>`;
    }

    function renderActiveTab() {
        const el = document.getElementById('tabContent');
        const unpaid = orders.filter(o => o.status === 'unpaid');
        updateActiveCount();
        if (!unpaid.length) { el.innerHTML = `<div class="empty-order">No active orders. Place an order to track it here.</div>`; return; }
        el.innerHTML = `<div class="history-list">${unpaid.map(o => `<div class="active-order-card ${selectedOrderId === o.id ? 'selected-order' : ''}"><div class="history-card-header"><span class="history-id">#${o.id}</span><span class="history-time">${o.time}</span></div><div class="history-items">${o.items.map(i => `${i.name} × ${i.qty}`).join(' · ')}</div><div class="history-footer"><div style="display:flex;gap:6px"><span class="badge badge-unpaid">Unpaid</span><span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${o.table}</span></div><div style="display:flex;gap:6px;align-items:center"><span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${fmt(o.total)}</span><button class="select-order-btn" onclick="selectActiveOrder(${o.id})">${selectedOrderId === o.id ? '✓ Selected' : 'Select'}</button><button class="pay-now-btn" onclick="payOrder(${o.id})">Pay Now</button></div></div></div>`).join('')}</div>`;
    }

    function updateActiveCount() {
        const count = orders.filter(o => o.status === 'unpaid').length;
        const el = document.getElementById('activeCount');
        if (el) el.textContent = count > 0 ? count : '';
    }

    function selectActiveOrder(id) {
        if (selectedOrderId === id) { selectedOrderId = null; } else {
            selectedOrderId = id;
            // Pre-fill the discount input with the selected order's existing discount %
            const so = orders.find(o => o.id === id);
            if (so) document.getElementById('discountInput').value = so.discountPct || 0;
        }
        renderActiveTab();
        updateBill();
    }

    function payOrder(id) {
        const o = orders.find(x => x.id === id);
        if (!o || o.status === 'paid') return;
        o.status = 'paid';
        o.paidTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        if (selectedOrderId === id) selectedOrderId = null;
        const toast = document.getElementById('toast');
        toast.textContent = `Order #${o.id} paid — ${fmt(o.total)}`;
        toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
        if (activeTab === 'active') renderActiveTab();
        updateActiveCount();
        updateBill();
    }

    function renderHistoryTab() {
        const el = document.getElementById('tabContent');
        if (!orders.length) { el.innerHTML = `<div class="empty-order">No orders yet.</div>`; return; }
        el.innerHTML = `<div class="history-list">${[...orders].reverse().map(o => `<div class="history-card"><div class="history-card-header"><span class="history-id">#${o.id}</span><span class="history-time">${o.time}${o.paidTime ? ' → Paid ' + o.paidTime : ''}</span></div><div class="history-items">${o.items.map(i => `${i.name} × ${i.qty}`).join(' · ')}</div><div class="history-footer"><div style="display:flex;gap:6px"><span class="badge ${o.status === 'paid' ? 'badge-paid' : 'badge-unpaid'}">${o.status === 'paid' ? 'Paid' : 'Unpaid'}</span><span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${o.table}</span></div><div style="display:flex;gap:6px;align-items:center"><span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${fmt(o.total)}</span>${o.status === 'unpaid' ? `<button class="pay-now-btn" onclick="payOrder(${o.id})">Pay Now</button>` : ''}</div></div></div>`).join('')}</div>`;
    }

    function renderStatsTab() {
        const el = document.getElementById('tabContent');
        const paidOrders = orders.filter(o => o.status === 'paid');
        const totalRev = paidOrders.reduce((s, o) => s + o.total, 0);
        const totalOrders = paidOrders.length;
        const unpaidTotal = orders.filter(o => o.status === 'unpaid').reduce((s, o) => s + o.total, 0);
        const avg = totalOrders ? totalRev / totalOrders : 0;
        const itemCounts = {};
        orders.forEach(o => o.items.forEach(i => { itemCounts[i.name] = (itemCounts[i.name] || 0) + i.qty; }));
        const topItems = Object.entries(itemCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

        el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total revenue</div><div class="stat-value">${fmt(totalRev)}</div><div class="stat-sub">today</div></div>
      <div class="stat-card"><div class="stat-label">Orders</div><div class="stat-value">${totalOrders}</div><div class="stat-sub">completed</div></div>
      <div class="stat-card"><div class="stat-label">Avg order</div><div class="stat-value">${fmt(avg)}</div><div class="stat-sub">per order</div></div>
      <div class="stat-card"><div class="stat-label">Unpaid</div><div class="stat-value">${fmt(unpaidTotal)}</div><div class="stat-sub">${orders.filter(o => o.status === 'unpaid').length} orders</div></div>
    </div>
    ${topItems.length ? `<div class="section-title">Top items</div><div style="display:flex;flex-direction:column;gap:6px">${topItems.map(([name, qty]) => `<div class="top-item-row"><span style="font-size:14px;color:var(--color-text-primary)">${name}</span><span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${qty} sold</span></div>`).join('')}</div>` : '<div class="empty-order">Complete some orders to see the summary.</div>'}
    <div style="margin-top:16px">
      <button class="export-btn" id="exportBtn" onclick="exportToExcel()" ${!orders.length ? 'disabled' : ''}>
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="14" height="14" rx="2" fill="#fff" fill-opacity="0.15"/><path d="M4 5.5L6.5 8 4 10.5M8 10.5h4" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 1v4h4" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg>
        Export end-of-day report (.xlsx)
      </button>
    </div>`;
    }

    function updateBill() {
        const items = cartItems();
        const body = document.getElementById('billBody');
        const disc = Math.max(0, Math.min(100, parseFloat(document.getElementById('discountInput').value) || 0));
        const sub = cartTotal(), discAmt = Math.round(sub * disc / 100), total = sub - discAmt;
        const hasItems = items.length > 0;
        const hasSelected = selectedOrderId !== null;
        document.getElementById('confirmBtn').disabled = !hasItems;
        document.getElementById('placeBtn').disabled = !hasItems;

        // If a placed order is selected, show its full bill (with live discount editing)
        if (hasSelected) {
            const so = orders.find(o => o.id === selectedOrderId);
            if (so && so.status === 'unpaid') {
                // Apply the current discount input to the selected active order
                const activeDsc = Math.max(0, Math.min(100, parseFloat(document.getElementById('discountInput').value) || 0));
                const activeDiscAmt = Math.round(so.subtotal * activeDsc / 100);
                const activeTotal = so.subtotal - activeDiscAmt;
                // Update the stored order with new discount values
                so.discountPct = Math.round(activeDsc);
                so.discount = activeDiscAmt;
                so.total = Math.round(activeTotal);

                let html = `<div style="padding:8px 0;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:600;color:var(--color-text-primary)">Order #${so.id}</span><span class="badge badge-unpaid">Unpaid</span></div>`;
                html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px">${so.table} · ${so.time}</div>`;
                html += `<div>${so.items.map(i => `<div class="bill-row"><span>${i.name} × ${i.qty}</span><span>${fmt(i.lineTotal)}</span></div>`).join('')}</div>`;
                html += `<hr class="divider">`;
                html += `<div class="bill-row muted"><span>Subtotal</span><span>${fmt(so.subtotal)}</span></div>`;
                if (so.discount > 0) {
                    html += `<div class="bill-row muted"><span>Discount (${so.discountPct}%)</span><span>− ${fmt(so.discount)}</span></div>`;
                }
                html += `<hr class="divider">`;
                html += `<div class="bill-total"><span>Total</span><span>${fmt(so.total)}</span></div>`;
                if (so.note) {
                    html += `<div style="margin-top:8px;font-size:12px;color:var(--color-text-tertiary);font-style:italic">Note: ${so.note}</div>`;
                }
                html += `<button class="pay-now-btn" style="margin-top:14px;width:100%;padding:10px;font-size:14px" onclick="payOrder(${so.id})">Pay This Order — ${fmt(so.total)}</button>`;
                html += `<button class="select-order-btn" style="margin-top:8px;width:100%;padding:8px;text-align:center" onclick="selectedOrderId=null;updateBill();if(activeTab==='active')renderActiveTab();">Deselect Order</button>`;
                body.innerHTML = html;
                // Also refresh the active tab card to show updated total
                if (activeTab === 'active') renderActiveTab();
                return;
            }
        }

        if (!hasItems) { body.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);font-size:14px">Add items to see the bill</div>`; return; }
        let html = '';
        html += `<div>${items.map(({ item, qty }) => `<div class="bill-row"><span>${item.name} × ${qty}</span><span>${fmt(item.price * qty)}</span></div>`).join('')}</div><hr class="divider"><div class="bill-row muted"><span>Subtotal</span><span>${fmt(sub)}</span></div>${disc > 0 ? `<div class="bill-row muted"><span>Discount (${Math.round(disc)}%)</span><span>− ${fmt(discAmt)}</span></div>` : ''}<hr class="divider"><div class="bill-total"><span>Total</span><span>${fmt(total)}</span></div>`;
        body.innerHTML = html;
    }



    function placeOrder() {
        const items = cartItems(); if (!items.length) return;
        const disc = Math.max(0, Math.min(100, parseFloat(document.getElementById('discountInput').value) || 0));
        const sub = cartTotal(), discAmt = Math.round(sub * disc / 100), total = sub - discAmt;
        const table = document.getElementById('tableSelect').value;
        const now = new Date();
        const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const note = document.getElementById('noteInput').value;
        orders.push({ id: nextOrderId++, items: items.map(({ item, qty }) => ({ name: item.name, qty, unitPrice: item.price, lineTotal: item.price * qty })), subtotal: Math.round(sub), discount: discAmt, discountPct: Math.round(disc), total: Math.round(total), table, time, note, status: 'unpaid' });
        cart = {}; document.getElementById('discountInput').value = 0; document.getElementById('noteInput').value = '';
        const toast = document.getElementById('toast');
        toast.textContent = `Order #${nextOrderId - 1} placed — ${fmt(total)}`;
        toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
        updateActiveCount();
        renderOrderTab(); updateBill();
    }

    function confirmPayment() {
        const items = cartItems(); if (!items.length) return;
        const disc = Math.max(0, Math.min(100, parseFloat(document.getElementById('discountInput').value) || 0));
        const sub = cartTotal(), discAmt = Math.round(sub * disc / 100), total = sub - discAmt;
        const table = document.getElementById('tableSelect').value;
        const now = new Date();
        const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const note = document.getElementById('noteInput').value;
        orders.push({ id: nextOrderId++, items: items.map(({ item, qty }) => ({ name: item.name, qty, unitPrice: item.price, lineTotal: item.price * qty })), subtotal: Math.round(sub), discount: discAmt, discountPct: Math.round(disc), total: Math.round(total), table, time, note, status: 'paid', paidTime: time });
        cart = {}; document.getElementById('discountInput').value = 0; document.getElementById('noteInput').value = '';
        const toast = document.getElementById('toast');
        toast.textContent = `Order #${nextOrderId - 1} confirmed & paid — ${fmt(total)}`;
        toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
        updateActiveCount();
        renderOrderTab(); updateBill();
    }

    function switchTab(tab, el) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if (tab === 'order') renderOrderTab();
        else if (tab === 'active') renderActiveTab();
        else if (tab === 'history') renderHistoryTab();
        else renderStatsTab();
    }

    function exportToExcel() {
        if (!orders.length) return;
        const wb = XLSX.utils.book_new();
        const today = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

        // --- Sheet 1: All Transactions ---
        const txRows = [['Order ID', 'Time', 'Table', 'Status', 'Items', 'Subtotal (Rs)', 'Discount (Rs)', 'Total (Rs)', 'Notes']];
        orders.forEach(o => {
            txRows.push([
                '#' + o.id, o.time, o.table,
                o.status === 'paid' ? 'Paid' : 'Unpaid',
                o.items.map(i => `${i.name} x${i.qty}`).join(', '),
                o.subtotal, o.discount, o.total, o.note || ''
            ]);
        });
        txRows.push([]);
        txRows.push(['', '', '', '', 'TOTAL', '=SUM(F2:F' + (orders.length + 1) + ')', '=SUM(G2:G' + (orders.length + 1) + ')', '=SUM(H2:H' + (orders.length + 1) + ')', '']);
        const ws1 = XLSX.utils.aoa_to_sheet(txRows);
        ws1['!cols'] = [{ wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 10 }, { wch: 40 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 24 }];
        XLSX.utils.book_append_sheet(wb, ws1, 'All Transactions');

        // --- Sheet 2: Order Status Summary ---
        const paidOrders = orders.filter(o => o.status === 'paid');
        const unpaidOrders = orders.filter(o => o.status === 'unpaid');
        const statusSummary = [
            ['End-of-Day Order Summary — ' + today],
            [],
            ['Status', 'No. of Orders', 'Total (Rs)'],
            ['Paid', paidOrders.length, paidOrders.reduce((s, o) => s + o.total, 0)],
            ['Unpaid', unpaidOrders.length, unpaidOrders.reduce((s, o) => s + o.total, 0)],
            [],
            ['TOTAL', orders.length, orders.reduce((s, o) => s + o.total, 0)],
        ];
        const ws2 = XLSX.utils.aoa_to_sheet(statusSummary);
        ws2['!cols'] = [{ wch: 16 }, { wch: 16 }, { wch: 22 }];
        XLSX.utils.book_append_sheet(wb, ws2, 'Order Summary');

        // --- Sheet 3: Item Sales ---
        const itemMap = {};
        orders.forEach(o => o.items.forEach(i => {
            if (!itemMap[i.name]) itemMap[i.name] = { qty: 0, revenue: 0 };
            itemMap[i.name].qty += i.qty;
            itemMap[i.name].revenue += i.lineTotal;
        }));
        const itemRows = [['Item Name', 'Qty Sold', 'Revenue (Rs)']];
        Object.entries(itemMap).sort((a, b) => b[1].revenue - a[1].revenue).forEach(([name, d]) => {
            itemRows.push([name, d.qty, d.revenue]);
        });
        itemRows.push([]);
        itemRows.push(['TOTAL', '=SUM(B2:B' + (Object.keys(itemMap).length + 1) + ')', '=SUM(C2:C' + (Object.keys(itemMap).length + 1) + ')']);
        const ws3 = XLSX.utils.aoa_to_sheet(itemRows);
        ws3['!cols'] = [{ wch: 22 }, { wch: 12 }, { wch: 18 }];
        XLSX.utils.book_append_sheet(wb, ws3, 'Item Sales');

        // --- Sheet 4: EOD Summary ---
        const totalRev = orders.reduce((s, o) => s + o.total, 0);
        const totalDisc = orders.reduce((s, o) => s + o.discount, 0);
        const eodRows = [
            ['END-OF-DAY REPORT — ' + today],
            [],
            ['Metric', 'Value'],
            ['Total Orders', orders.length],
            ['Paid Orders', paidOrders.length],
            ['Unpaid Orders', unpaidOrders.length],
            ['Total Revenue (Rs)', totalRev],
            ['Total Discounts Given (Rs)', totalDisc],
            ['Average Order Value (Rs)', Math.round(totalRev / orders.length)],
        ];
        const ws4 = XLSX.utils.aoa_to_sheet(eodRows);
        ws4['!cols'] = [{ wch: 26 }, { wch: 20 }];
        XLSX.utils.book_append_sheet(wb, ws4, 'EOD Summary');

        XLSX.writeFile(wb, 'cafe_eod_' + new Date().toISOString().slice(0, 10) + '.xlsx');
    }

    renderMenu(); renderOrderTab(); updateBill(); updateActiveCount();
</script>
